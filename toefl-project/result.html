<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Results — TOEFL Practice</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .result-container {
            text-align: center;
            padding: 80px 40px;
        }
        .score-circle {
            width: 200px;
            height: 200px;
            border: 4px solid var(--accent-gold);
            border-radius: 50%;
            margin: 0 auto 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--bg-card);
            box-shadow: var(--shadow-glow);
        }
        .score-value {
            font-size: 64px;
            font-family: 'Playfair Display', serif;
            color: var(--accent-gold-light);
            line-height: 1;
        }
        .score-label {
            font-size: 14px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 8px;
        }
        .status-msg {
            font-size: 24px;
            margin-bottom: 40px;
            color: var(--text-secondary);
        }
        .action-btns {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="glass-card result-container">
            <p class="wordmark">Test Completed</p>
            <h1>Performance Summary<em style="font-style:italic; color: var(--accent-gold);">.</em></h1>
            
            <div class="score-circle">
                <div class="score-value" id="final-score">0/0</div>
                <div class="score-label">Correct Answers</div>
            </div>

            <p class="status-msg" id="status-msg">Analyzing your performance...</p>

            <div class="action-btns">
                <a href="index.html" class="nav-link">Return to Home</a>
            </div>
        </div>
        <footer>Imperium Digital Education Project.</footer>
    </div>

    <script>
        const score = localStorage.getItem('toefl_score') || 0;
        const total = localStorage.getItem('toefl_total') || 0;
        const section = localStorage.getItem('toefl_section') || 'Practice';

        document.getElementById('final-score').innerText = `${score}/${total}`;
        
        const msgEl = document.getElementById('status-msg');
        const percentage = (score / total) * 100;

        if (percentage >= 80) {
            msgEl.innerText = `Excellent work in the ${section} section!`;
        } else if (percentage >= 50) {
            msgEl.innerText = `Good effort. Keep practicing your ${section} skills.`;
        } else {
            msgEl.innerText = `Don't give up. Consistent practice is key to mastering ${section}.`;
        }
    </script>
</body>
</html>
